<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #333;
}

/* NAVBAR */
nav {
    position: sticky;
    top: 0;
    background: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

nav a {
    text-decoration: none;
    color: #333;
    margin: 0 15px;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 90vh;
    background: linear-gradient(to right, #007BFF, #00c6ff);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 3rem;
}

/* SECTION */
.section {
    padding: 60px 20px;
    text-align: center;
}

/* SERVICES */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.service {
    width: 250px;
    margin: 15px;
    padding: 20px;
    background: #f4f4f4;
    border-radius: 8px;
}

/* PORTFOLIO */
.portfolio {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.portfolio div {
    background: #ddd;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* CONTACT */
input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px 20px;
    background: #007BFF;
    color: white;
    border: none;
}

/* FOOTER */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 20px;
}

/* MOBILE */
@media (max-width: 600px) {
    nav {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div><strong>MyBrand</strong></div>
    <div>
        <a href="#">Home</a>
        <a href="#services">Services</a>
        <a href="#portfolio">My Work</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>We Build Beautiful Websites</h1>
        <p>Modern design. Clean code. Great results.</p>
    </div>
</section>

<!-- SERVICES -->
<section class="section" id="services">
    <h2>What We Do</h2>
    <div class="services">
        <div class="service">Web Design</div>
        <div class="service">Branding</div>
        <div class="service">Development</div>
        <div class="service">Marketing</div>
    </div>
</section>

<!-- PORTFOLIO -->
<section class="section" id="portfolio">
    <h2>My Work</h2>
    <div class="portfolio">
        <div>Project 1</div>
        <div>Project 2</div>
        <div>Project 3</div>
        <div>Project 4</div>
    </div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
    <h2>Contact</h2>

    <form action="https://formspree.io/f/mjganwdw" method="POST">
        <input type="text" name="name" placeholder="Name" required><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <textarea name="message" placeholder="Message" required></textarea><br>
        <button type="submit">Send</button>
    </form>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
